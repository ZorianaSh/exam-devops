name: Task3 Deploy

on:
  push:
    branches:
      - develop
    tags:
      - '1.0.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/develop" ]; then
            echo "tag=develop" >> "$GITHUB_OUTPUT"
            echo "env_name=dev" >> "$GITHUB_OUTPUT"
          else
            echo "tag=1.0.0" >> "$GITHUB_OUTPUT"
            echo "env_name=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" 
--password-stdin

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/task3-app:${{ 
steps.vars.outputs.tag }} ./task3/app

      - name: Push image
        run: docker push ghcr.io/${{ github.repository_owner }}/task3-app:${{ 
steps.vars.outputs.tag }}

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 159.89.12.21
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root
            if [ ! -d exam-devops ]; then
              git clone https://github.com/${{ github.repository }}.git
            fi
            cd exam-devops
            git fetch --all
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            if [ "${{ steps.vars.outputs.env_name }}" = "dev" ]; then
              kubectl apply -f task3/k8s/dev/namespace.yaml
              kubectl apply --dry-run=client -f task3/k8s/dev/
              kubectl apply -f task3/k8s/dev/
            else
              kubectl apply -f task3/k8s/release/namespace.yaml
              kubectl apply --dry-run=client -f task3/k8s/release/
              kubectl apply -f task3/k8s/release/
            fi
