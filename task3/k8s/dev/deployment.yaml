apiVersion: apps/v1
kind: Deployment
metadata:
  name: task3-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task3-app
  template:
    metadata:
      labels:
        app: task3-app
    spec:
      containers:
        - name: task3-app
          image: ghcr.io/zorianash/task3-app:develop
          ports:
            - containerPort: 5000
