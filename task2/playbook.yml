- hosts: minikube
  become: yes
  vars:
    kubectl_version: "v1.30.1"
    minikube_version: "v1.35.0"
    helm_version: "v3.15.4"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - apt-transport-https
          - ca-certificates
          - conntrack
          - socat
          - docker.io
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Install kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Minikube
      get_url:
        url: "https://storage.googleapis.com/minikube/releases/{{ minikube_version 
}}/minikube-linux-amd64"
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Install Helm archive
      get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: /tmp/helm.tar.gz
        mode: '0644'

    - name: Unarchive Helm
      unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Install Helm binary
      copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        remote_src: yes
        mode: '0755'

- name: Start Minikube
  shell: minikube start --driver=docker --force
  args:
    creates: /root/.minikube/profiles/minikube/config.json

      shell: minikube start 
--driver=docker
      args:
        creates: /root/.minikube/profiles/minikube/config.json

    - name: Enable ingress addon
      shell: minikube addons enable ingress
      changed_when: false

    - name: Check kubectl version
      command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Check Minikube status
      command: minikube status
      register: minikube_check
      changed_when: false

    - name: Check Helm version
      command: helm version
      register: helm_check
      changed_when: false

    - name: Show kubectl version
      debug:
        var: kubectl_check.stdout_lines

    - name: Show Minikube status
      debug:
        var: minikube_check.stdout_lines

    - name: Show Helm version
      debug:
        var: helm_check.stdout_lines
